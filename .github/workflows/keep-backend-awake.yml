name: Keep backend awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (Render free tier sleeps after 15 min)
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::BACKEND_HEALTHCHECK_URL is not configured; skipping backend ping."
            exit 0
          fi

          # Strip /health suffix if present and use /ping instead (no DB/Redis round-trip)
          BASE_URL="${BACKEND_URL%/health}"
          PING_URL="${BASE_URL}/ping"

          echo "Pinging $PING_URL"
          curl --fail --show-error --silent --max-time 10 "$PING_URL" >/dev/null
          echo "Backend ping successful"
