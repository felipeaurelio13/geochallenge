name: Keep backend awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (Render free tier sleeps after 15 min)
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (and Redis)
        env:
          BACKEND_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::BACKEND_HEALTHCHECK_URL is not configured; skipping backend ping."
            exit 0
          fi

          # Antes pegábamos /ping (sólo HTTP, no toca DB/Redis). El problema:
          # Upstash free tier elimina DBs después de 14 días sin comandos. El
          # backend se mantenía vivo pero Redis se borraba (incidente 25-mayo).
          # Ahora pegamos /health que ejecuta `prisma.$queryRaw` Y `redis.ping()`,
          # manteniendo ambos servicios "activos" desde la perspectiva del proveedor.
          BASE_URL="${BACKEND_URL%/health}"
          BASE_URL="${BASE_URL%/ping}"
          HEALTH_URL="${BASE_URL}/health"

          echo "Pinging $HEALTH_URL"
          # /health puede devolver 503 si Redis está caído — eso NO es razón
          # para fallar el workflow (el endpoint igual ejecutó el ping, que es
          # nuestro objetivo). Aceptamos 200 y 503 como "ok".
          status=$(curl --silent --show-error --max-time 15 -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" || echo "000")
          echo "HTTP $status — body:"
          cat /tmp/health.json || true
          echo ""
          if [ "$status" = "200" ]; then
            echo "Backend + Redis healthy"
          elif [ "$status" = "503" ]; then
            echo "::warning::Backend reachable but a dependency is degraded (still counts as keep-alive)"
          else
            echo "::error::Backend unreachable (status=$status)"
            exit 1
          fi
